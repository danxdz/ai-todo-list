<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D fruit merge — minimal demo</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #1a1d24; font-family: system-ui, sans-serif; }
    #ui {
      position: fixed; left: 12px; top: 12px; z-index: 1;
      color: #e8eaef; font-size: 14px; line-height: 1.5; max-width: 320px;
      text-shadow: 0 1px 2px #000a;
    }
    #ui kbd { background: #333; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="ui">
    <strong>3D merge demo</strong><br />
    Move pointer: preview next drop · Click: release<br />
    Same size merges into the next bigger tier<br />
    <kbd>R</kbd> reset world
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import * as CANNON from 'cannon-es';

    // --- Tunables
    const CUP = { halfX: 2.2, halfZ: 1.6, wallH: 5, wallT: 0.15 };
    const FRUITS = [
      { radius: 0.22, color: 0xff6b9d },
      { radius: 0.28, color: 0xff9f43 },
      { radius: 0.36, color: 0xfeca57 },
      { radius: 0.46, color: 0x5f27cd },
      { radius: 0.58, color: 0x00d2d3 },
    ];
    /** Highest tier that can still pair (two of this merge to tier + 1) */
    const MERGEABLE_TYPE_MAX = FRUITS.length - 2;

    // --- Three
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2c3038);
    scene.fog = new THREE.Fog(0x2c3038, 12, 28);

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 6.5, 9);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.2, 0);
    controls.enableDamping = true;
    controls.maxPolarAngle = Math.PI * 0.48;
    // Left click / tap = drop fruit; orbit with right-drag (middle = zoom)
    controls.mouseButtons.LEFT = undefined;
    controls.mouseButtons.RIGHT = THREE.MOUSE.ROTATE;
    controls.mouseButtons.MIDDLE = THREE.MOUSE.DOLLY;

    scene.add(new THREE.AmbientLight(0xffffff, 0.45));
    const sun = new THREE.DirectionalLight(0xffffff, 0.95);
    sun.position.set(4, 10, 6);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 24;
    sun.shadow.camera.left = -8;
    sun.shadow.camera.right = 8;
    sun.shadow.camera.top = 8;
    sun.shadow.camera.bottom = -2;
    scene.add(sun);

    // Cup visuals: rim + edges only (avoids stacked transmission “double glass”)
    const rimMat = new THREE.MeshStandardMaterial({
      color: 0x8ab4e8,
      metalness: 0.25,
      roughness: 0.35,
      transparent: true,
      opacity: 0.88,
    });
    const floorMat = new THREE.MeshStandardMaterial({
      color: 0x3d4a5c,
      metalness: 0.05,
      roughness: 0.85,
    });
    const floorGeo = new THREE.PlaneGeometry(CUP.halfX * 2 + 0.2, CUP.halfZ * 2 + 0.2);
    const floorVis = new THREE.Mesh(floorGeo, floorMat);
    floorVis.rotation.x = -Math.PI / 2;
    floorVis.position.y = 0.002;
    floorVis.receiveShadow = true;
    scene.add(floorVis);

    const edgeT = 0.06;
    const wh = CUP.wallH;
    function addEdgeBox(w, h, d, x, y, z) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), rimMat);
      m.position.set(x, y, z);
      m.castShadow = true;
      m.receiveShadow = true;
      scene.add(m);
    }
    // Top rim
    addEdgeBox(CUP.halfX * 2 + edgeT * 2, edgeT, edgeT, 0, wh, -CUP.halfZ - edgeT / 2);
    addEdgeBox(CUP.halfX * 2 + edgeT * 2, edgeT, edgeT, 0, wh,  CUP.halfZ + edgeT / 2);
    addEdgeBox(edgeT, edgeT, CUP.halfZ * 2 + edgeT * 2, -CUP.halfX - edgeT / 2, wh, 0);
    addEdgeBox(edgeT, edgeT, CUP.halfZ * 2 + edgeT * 2,  CUP.halfX + edgeT / 2, wh, 0);
    // Vertical corner posts (thin)
    const postY = wh / 2;
    function post(x, z) {
      addEdgeBox(edgeT, wh, edgeT, x, postY, z);
    }
    post(-CUP.halfX, -CUP.halfZ);
    post( CUP.halfX, -CUP.halfZ);
    post(-CUP.halfX,  CUP.halfZ);
    post( CUP.halfX,  CUP.halfZ);

    // --- Cannon world
    const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -18, 0) });
    world.allowSleep = true;
    world.defaultContactMaterial.friction = 0.35;
    world.defaultContactMaterial.restitution = 0.08;

    const physicsMaterial = new CANNON.Material('fruit');
    const fruitContact = new CANNON.ContactMaterial(physicsMaterial, physicsMaterial, {
      friction: 0.2,
      restitution: 0.12,
    });
    world.addContactMaterial(fruitContact);

    function addStaticBox(hx, hy, hz, x, y, z) {
      const shape = new CANNON.Box(new CANNON.Vec3(hx, hy, hz));
      const body = new CANNON.Body({ mass: 0 });
      body.addShape(shape);
      body.position.set(x, y, z);
      world.addBody(body);
    }
    // Floor + walls (aligned with visual cup)
    addStaticBox(CUP.halfX + CUP.wallT, 0.05, CUP.halfZ + CUP.wallT, 0, -0.05, 0);
    addStaticBox(CUP.wallT / 2, CUP.wallH / 2, CUP.halfZ + CUP.wallT, -CUP.halfX - CUP.wallT / 2, CUP.wallH / 2, 0);
    addStaticBox(CUP.wallT / 2, CUP.wallH / 2, CUP.halfZ + CUP.wallT,  CUP.halfX + CUP.wallT / 2, CUP.wallH / 2, 0);
    addStaticBox(CUP.halfX, CUP.wallH / 2, CUP.wallT / 2, 0, CUP.wallH / 2, -CUP.halfZ - CUP.wallT / 2);
    addStaticBox(CUP.halfX, CUP.wallH / 2, CUP.wallT / 2, 0, CUP.wallH / 2,  CUP.halfZ + CUP.wallT / 2);

    const raycaster = new THREE.Raycaster();
    const dropPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const planeHit = new THREE.Vector3();
    const DROP_CENTER_Y = CUP.wallH - 0.5;

    /** @type {{ mesh: THREE.Mesh, body: CANNON.Body, type: number }[]} */
    let fruits = [];
    /** Clicks alternate the two smallest tiers (Suika-style queue) */
    let nextType = 0;
    let mergeCooldown = 0;

    /** Ghost sphere: no physics, follows pointer */
    let ghostMesh = null;
    let ghostVisualType = -1;
    const ghostPos = new THREE.Vector3(0, DROP_CENTER_Y, 0);

    function disposeGhost() {
      if (!ghostMesh) return;
      scene.remove(ghostMesh);
      ghostMesh.geometry.dispose();
      if (ghostMesh.material && typeof ghostMesh.material.dispose === 'function') {
        ghostMesh.material.dispose();
      }
      ghostMesh = null;
      ghostVisualType = -1;
    }

    function ensureGhostForType(type) {
      if (ghostVisualType === type && ghostMesh) return;
      disposeGhost();
      const spec = FRUITS[type];
      const geo = new THREE.SphereGeometry(spec.radius, 28, 20);
      const mat = new THREE.MeshStandardMaterial({
        color: spec.color,
        roughness: 0.35,
        metalness: 0.1,
        transparent: true,
        opacity: 0.5,
        depthWrite: false,
      });
      ghostMesh = new THREE.Mesh(geo, mat);
      ghostMesh.renderOrder = 1;
      scene.add(ghostMesh);
      ghostVisualType = type;
    }

    function pendingDropType() {
      return nextType % 2;
    }

    function clampDropXZ(x, z, radius) {
      const m = Math.max(radius * 0.85, 0.05);
      return {
        x: Math.max(-CUP.halfX + m, Math.min(CUP.halfX - m, x)),
        z: Math.max(-CUP.halfZ + m, Math.min(CUP.halfZ - m, z)),
      };
    }

    function updateGhostAt(clientX, clientY) {
      const t = pendingDropType();
      ensureGhostForType(t);
      const spec = FRUITS[t];
      const rect = renderer.domElement.getBoundingClientRect();
      const ndcX = ((clientX - rect.left) / rect.width) * 2 - 1;
      const ndcY = -((clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(new THREE.Vector2(ndcX, ndcY), camera);
      dropPlane.constant = -DROP_CENTER_Y;
      if (!raycaster.ray.intersectPlane(dropPlane, planeHit)) return;
      const c = clampDropXZ(planeHit.x, planeHit.z, spec.radius);
      ghostPos.set(c.x, DROP_CENTER_Y, c.z);
      ghostMesh.position.copy(ghostPos);
    }

    function spawnFruit(type, x, y, z) {
      const spec = FRUITS[type];
      const geo = new THREE.SphereGeometry(spec.radius, 32, 24);
      const mat = new THREE.MeshStandardMaterial({
        color: spec.color,
        roughness: 0.35,
        metalness: 0.1,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);

      const shape = new CANNON.Sphere(spec.radius);
      const body = new CANNON.Body({
        mass: 1 + type * 0.15,
        linearDamping: 0.05,
        angularDamping: 0.2,
        material: physicsMaterial,
      });
      body.addShape(shape);
      body.position.set(x, y, z);
      body.sleepSpeedLimit = 0.35;
      body.sleepTimeLimit = 0.4;
      body.fruitType = type;
      world.addBody(body);

      fruits.push({ mesh, body, type });
    }

    function removeFruit(entry) {
      scene.remove(entry.mesh);
      entry.mesh.geometry.dispose();
      if (entry.mesh.material && typeof entry.mesh.material.dispose === 'function') {
        entry.mesh.material.dispose();
      }
      world.removeBody(entry.body);
      fruits = fruits.filter((f) => f !== entry);
    }

    function tryMerge() {
      if (mergeCooldown > 0) return;
      const dynamics = fruits.filter((f) => f.type <= MERGEABLE_TYPE_MAX);
      for (let i = 0; i < dynamics.length; i++) {
        for (let j = i + 1; j < dynamics.length; j++) {
          const a = dynamics[i];
          const b = dynamics[j];
          if (a.type !== b.type) continue;
          const ra = FRUITS[a.type].radius;
          const rb = FRUITS[b.type].radius;
          const dist = a.body.position.distanceTo(b.body.position);
          const mergeDist = (ra + rb) * 0.92;
          if (dist > mergeDist) continue;

          const nx = (a.body.position.x + b.body.position.x) / 2;
          const ny = (a.body.position.y + b.body.position.y) / 2;
          const nz = (a.body.position.z + b.body.position.z) / 2;
          const newType = a.type + 1;
          const rNew = FRUITS[newType].radius;
          const nyLifted = Math.max(rNew * 0.5, ny);

          removeFruit(a);
          removeFruit(b);
          spawnFruit(newType, nx, nyLifted, nz);
          // Nudge awake
          mergeCooldown = 8;
          return;
        }
      }
    }

    function reset() {
      fruits.slice().forEach(removeFruit);
      nextType = 0;
      mergeCooldown = 0;
      ensureGhostForType(pendingDropType());
    }

    function dropNext() {
      const t = pendingDropType();
      nextType++;
      const spec = FRUITS[t];
      const c = clampDropXZ(ghostPos.x, ghostPos.z, spec.radius);
      spawnFruit(t, c.x, DROP_CENTER_Y, c.z);
      const last = fruits[fruits.length - 1];
      last.body.velocity.set(0, -0.5, 0);
      ensureGhostForType(pendingDropType());
    }

    renderer.domElement.addEventListener('pointermove', (e) => {
      if (e.target !== renderer.domElement) return;
      updateGhostAt(e.clientX, e.clientY);
    });

    renderer.domElement.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return;
      updateGhostAt(e.clientX, e.clientY);
      dropNext();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'r' || e.key === 'R') reset();
    });

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    const clock = new THREE.Clock();
    let acc = 0;
    const fixed = 1 / 120;

    function tick() {
      requestAnimationFrame(tick);
      const dt = Math.min(clock.getDelta(), 0.05);
      controls.update();

      acc += dt;
      while (acc >= fixed) {
        world.step(fixed);
        acc -= fixed;
      }
      if (mergeCooldown > 0) mergeCooldown--;

      for (const f of fruits) {
        f.mesh.position.copy(f.body.position);
        f.mesh.quaternion.copy(f.body.quaternion);
      }

      tryMerge();

      renderer.render(scene, camera);
    }

    ensureGhostForType(pendingDropType());
    updateGhostAt(innerWidth / 2, innerHeight / 2);

    tick();
  </script>
</body>
</html>
