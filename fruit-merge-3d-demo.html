<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <link rel="icon" href="data:," />
  <title>3D fruit merge — minimal demo</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: radial-gradient(ellipse 120% 80% at 50% 100%, #151a24 0%, #07080c 55%); font-family: system-ui, sans-serif; }
    #hud {
      position: fixed; left: 12px; top: 10px; z-index: 2;
      color: #eee; font-size: 14px; line-height: 1.45; max-width: 280px;
      text-shadow: 0 1px 3px #000;
    }
    #hud strong { color: #fff; }
    #hud kbd { background: #222; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    #overlay {
      display: none; position: fixed; inset: 0; z-index: 3;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.72); color: #fff; font-size: clamp(18px, 4vw, 28px);
      text-align: center; padding: 24px; pointer-events: none;
    }
    #overlay.visible { display: flex; flex-direction: column; gap: 12px; }
    #help {
      position: fixed; right: 10px; bottom: 10px; z-index: 2;
      color: #888; font-size: 12px; max-width: 220px; text-align: right;
      line-height: 1.35;
    }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }
  </style>
</head>
<body>
  <div id="hud">
    <strong>Score</strong> <span id="scoreVal">0</span><br />
    <strong>Level</strong> <span id="levelVal">1</span>
    <span style="opacity:.75"> · next at <span id="nextLvlVal">200</span> pts</span><br />
    <span style="font-size:12px;opacity:.85">Fixed 2D-style view · <kbd>F</kbd> browser fullscreen</span>
  </div>
  <div id="overlay">
    <div id="overlayTitle">Game over</div>
    <div id="overlaySub" style="font-size:55%;opacity:.9">Something crossed the red line</div>
    <div style="font-size:45%;opacity:.75;margin-top:8px">Press <kbd style="background:#333;padding:4px 8px;border-radius:4px">R</kbd> to restart</div>
  </div>
  <div id="help">
    Move / click: aim & drop<br />
    Merge = points · <kbd>R</kbd> reset · <kbd>F</kbd> fullscreen
  </div>

  <!-- Local vendor/ so the game works offline and when CDN DNS fails (ERR_NAME_NOT_RESOLVED) -->
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three.module.js",
      "cannon-es": "./vendor/cannon-es.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import * as CANNON from 'cannon-es';

    const ROW_Z = 0;
    const FRUIT_MASS_BASE = 5.5;
    const FRUIT_MASS_PER_TIER = 0.85;

    const FRUITS = [
      { radius: 0.2, color: 0xff6b9d },
      { radius: 0.26, color: 0xff9f43 },
      { radius: 0.34, color: 0xfeca57 },
      { radius: 0.44, color: 0x5f27cd },
      { radius: 0.56, color: 0x1abc9c },
      { radius: 0.7, color: 0x2ecc71 },
      { radius: 0.86, color: 0xe74c3c },
    ];
    const MERGEABLE_TYPE_MAX = FRUITS.length - 2;
    const MAX_RADIUS = FRUITS[FRUITS.length - 1].radius;

    /** Points when two of `type` merge into `type+1` */
    const MERGE_POINTS = FRUITS.map((_, i) => (i + 1) * 15);

    const CUP_BASE = {
      /** Wider lane ≈ mobile portrait column when framed */
      halfX: 2.85,
      get halfZ() {
        return Math.max(0.52, MAX_RADIUS + 0.08);
      },
      wallT: 0.14,
    };

    let CUP = { ...CUP_BASE, wallH: 11 };
    /** Drop height (below rim). Lose line must be higher (Y-up): rim at y=wallH */
    let DROP_CENTER_Y = CUP.wallH - 0.55;
    let GAME_OVER_Y = CUP.wallH - 0.12;

    const scoreEl = document.getElementById('scoreVal');
    const levelEl = document.getElementById('levelVal');
    const nextLvlEl = document.getElementById('nextLvlVal');
    const overlay = document.getElementById('overlay');

    let score = 0;
    let level = 1;
    let levelScoreGoal = 200;
    let gameOver = false;

    /** One drop at a time until the last spawn clears the drop band (stops overlap pops → false game over). */
    let dropAllowed = true;
    /** @type {CANNON.Body | null} */
    let lastDroppedBody = null;
    let dropLockCalmSec = 0;

    /** Require pile above line for this long (seconds) — ignores one-frame physics spikes */
    let gameOverDwell = 0;
    const GAME_OVER_DWELL_SEC = 0.45;

    function syncHud() {
      scoreEl.textContent = String(score);
      levelEl.textContent = String(level);
      nextLvlEl.textContent = String(levelScoreGoal);
    }

    function addScore(delta) {
      score += delta;
      while (score >= levelScoreGoal) {
        score -= levelScoreGoal;
        level += 1;
        levelScoreGoal = Math.floor(levelScoreGoal * 1.25 + 50);
      }
      syncHud();
    }

    // --- Three
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0c10);
    scene.fog = null;

    /** Orthographic = fixed “2D” view (no orbit / perspective tilt) */
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 80);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.52));
    const sun = new THREE.DirectionalLight(0xfff4e6, 0.88);
    sun.position.set(0.6, 18, 12);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 40;
    sun.shadow.camera.left = -10;
    sun.shadow.camera.right = 10;
    sun.shadow.camera.top = 12;
    sun.shadow.camera.bottom = -4;
    scene.add(sun);

    const rimMat = new THREE.MeshStandardMaterial({
      color: 0x3d4f7c,
      metalness: 0.35,
      roughness: 0.38,
      emissive: 0x1a2744,
      emissiveIntensity: 0.25,
    });
    const floorMat = new THREE.MeshStandardMaterial({
      color: 0x242b38,
      metalness: 0.12,
      roughness: 0.88,
    });
    const zoneBackMat = new THREE.MeshStandardMaterial({
      color: 0x1e2636,
      metalness: 0.05,
      roughness: 0.95,
      emissive: 0x121820,
      emissiveIntensity: 0.4,
    });

    const cupGroup = new THREE.Group();
    scene.add(cupGroup);

    let floorVis = null;
    let dangerLine = null;
    const edgeMeshes = [];

    const staticBodies = [];

    const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -22, 0) });
    world.allowSleep = true;
    world.defaultContactMaterial.friction = 0.42;
    world.defaultContactMaterial.restitution = 0.03;

    const physicsMaterial = new CANNON.Material('fruit');
    const fruitContact = new CANNON.ContactMaterial(physicsMaterial, physicsMaterial, {
      friction: 0.32,
      restitution: 0.05,
    });
    world.addContactMaterial(fruitContact);

    function clearCupVisuals() {
      while (cupGroup.children.length) {
        const o = cupGroup.children.pop();
        if (o.geometry) o.geometry.dispose();
        if (o.material) o.material.dispose?.();
      }
      edgeMeshes.length = 0;
      floorVis = null;
      dangerLine = null;
    }

    function buildCupVisuals() {
      clearCupVisuals();
      const wh = CUP.wallH;
      const hx = CUP.halfX;
      const hz = CUP.halfZ;
      const edgeT = 0.09;
      const backZ = ROW_Z - 0.52;

      const backW = hx * 2 + CUP.wallT * 2 + 0.55;
      const backH = wh + 0.75;
      const zoneBack = new THREE.Mesh(new THREE.PlaneGeometry(backW, backH), zoneBackMat);
      zoneBack.position.set(0, wh * 0.5 - 0.08, backZ);
      zoneBack.receiveShadow = true;
      cupGroup.add(zoneBack);

      const floorGeo = new THREE.PlaneGeometry(hx * 2 + 0.35, hz * 2 + 0.35);
      floorVis = new THREE.Mesh(floorGeo, floorMat);
      floorVis.rotation.x = -Math.PI / 2;
      floorVis.position.y = 0.002;
      floorVis.receiveShadow = true;
      cupGroup.add(floorVis);

      function addEdgeBox(w, h, d, x, y, z) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), rimMat);
        m.position.set(x, y, z);
        m.castShadow = true;
        m.receiveShadow = true;
        cupGroup.add(m);
        edgeMeshes.push(m);
      }
      addEdgeBox(hx * 2 + edgeT * 2, edgeT, edgeT, 0, wh, -hz - edgeT / 2);
      addEdgeBox(hx * 2 + edgeT * 2, edgeT, edgeT, 0, wh,  hz + edgeT / 2);
      addEdgeBox(edgeT, edgeT, hz * 2 + edgeT * 2, -hx - edgeT / 2, wh, 0);
      addEdgeBox(edgeT, edgeT, hz * 2 + edgeT * 2,  hx + edgeT / 2, wh, 0);
      const postY = wh / 2;
      function post(x, z) {
        addEdgeBox(edgeT, wh, edgeT, x, postY, z);
      }
      post(-hx, -hz);
      post( hx, -hz);
      post(-hx,  hz);
      post( hx,  hz);

      const lineMat = new THREE.MeshBasicMaterial({
        color: 0xff3355,
        transparent: true,
        opacity: 0.55,
        depthWrite: false,
      });
      const lineGeo = new THREE.PlaneGeometry(hx * 2 + 0.04, 0.1);
      dangerLine = new THREE.Mesh(lineGeo, lineMat);
      dangerLine.rotation.x = -Math.PI / 2;
      dangerLine.position.set(0, GAME_OVER_Y + 0.01, ROW_Z + 0.02);
      cupGroup.add(dangerLine);
    }

    function clearStaticPhysics() {
      for (const b of staticBodies) world.removeBody(b);
      staticBodies.length = 0;
    }

    function buildStaticPhysics() {
      clearStaticPhysics();
      const hx = CUP.halfX;
      const hz = CUP.halfZ;
      const wt = CUP.wallT;
      const wh = CUP.wallH;
      addStaticBox(hx + wt, 0.05, hz + wt, 0, -0.05, 0);
      addStaticBox(wt / 2, wh / 2, hz + wt, -hx - wt / 2, wh / 2, 0);
      addStaticBox(wt / 2, wh / 2, hz + wt,  hx + wt / 2, wh / 2, 0);
      addStaticBox(hx, wh / 2, wt / 2, 0, wh / 2, -hz - wt / 2);
      addStaticBox(hx, wh / 2, wt / 2, 0, wh / 2,  hz + wt / 2);
    }

    function addStaticBox(hx, hy, hz, x, y, z) {
      const shape = new CANNON.Box(new CANNON.Vec3(hx, hy, hz));
      const body = new CANNON.Body({ mass: 0 });
      body.addShape(shape);
      body.position.set(x, y, z);
      world.addBody(body);
      staticBodies.push(body);
    }

    /** Max |x| for sphere center so it stays inside inner walls */
    function innerHalfXForRadius(radius) {
      const innerFace = CUP.halfX - CUP.wallT;
      const pad = 0.04;
      return Math.max(0.05, innerFace - radius - pad);
    }

    function clampDropXZ(x, _z, radius) {
      const lim = innerHalfXForRadius(radius);
      return {
        x: Math.max(-lim, Math.min(lim, x)),
        z: ROW_Z,
      };
    }

    function computeCupHeightForViewport() {
      const minH = 10;
      const maxH = 20;
      const t = Math.min(1, innerHeight / 700);
      return minH + (maxH - minH) * t;
    }

    /**
     * Bottom-anchored ortho: floor must sit *above* the canvas bottom — use a fraction of
     * view height for padding (fixed world units vanish on wide landscape windows).
     */
    function fitCameraToCup() {
      const wh = CUP.wallH;
      const hx = CUP.halfX + CUP.wallT + 0.32;
      const playTop = Math.max(wh, DROP_CENTER_Y, GAME_OVER_Y) + 0.6;
      const floorY = 0;
      const aspect = Math.max(0.28, innerWidth / innerHeight);
      const minHalfW = hx * 1.06;

      const contentSpan = Math.max(6.5, playTop - floorY);
      const topPad = 0.55;
      /** Min fraction of view height reserved below floor (visible “play mat”) */
      const bottomFrac = 0.14;
      /** Solve: viewH = contentSpan + topPad + bottomFrac * viewH */
      let viewH = (contentSpan + topPad) / (1 - bottomFrac);
      let halfW = (viewH * aspect) / 2;
      if (halfW < minHalfW) {
        halfW = minHalfW;
        viewH = (2 * halfW) / aspect;
      }
      const minViewH = (contentSpan + topPad) / (1 - bottomFrac);
      if (viewH < minViewH) {
        viewH = minViewH;
        halfW = Math.max(minHalfW, (viewH * aspect) / 2);
      }

      // Wide windows: keep a ~9:16 “phone column” so the lane is big on screen (not a tiny center sliver)
      const halfWPortrait = (viewH * (9 / 16)) / 2;
      halfW = Math.max(minHalfW, Math.min(halfW, halfWPortrait));

      const padBelow = Math.max(2.0, bottomFrac * viewH);
      const camBottom = floorY - padBelow;
      const camTop = camBottom + viewH;
      if (camTop < playTop + 0.35) {
        const need = playTop + 0.35 - camTop;
        camera.bottom = camBottom - need;
        camera.top = camTop + need;
      } else {
        camera.bottom = camBottom;
        camera.top = camTop;
      }

      camera.left = -halfW;
      camera.right = halfW;
      const midY = (camera.top + camera.bottom) / 2;
      camera.position.set(0, midY, 20);
      camera.up.set(0, 1, 0);
      camera.lookAt(0, midY, 0);
      camera.near = 0.5;
      camera.far = 80;
      camera.updateProjectionMatrix();
    }

    function applyCupLayout() {
      CUP.wallH = computeCupHeightForViewport();
      DROP_CENTER_Y = CUP.wallH - 0.55;
      // Just under rim — must stay above drop + largest spawn radius (~0.26) or first click = game over
      GAME_OVER_Y = CUP.wallH - 0.12;
      buildCupVisuals();
      buildStaticPhysics();
      fitCameraToCup();
      if (dangerLine) dangerLine.position.y = GAME_OVER_Y + 0.012;
    }

    applyCupLayout();

    const raycaster = new THREE.Raycaster();
    const dropPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const planeHit = new THREE.Vector3();

    /** @type {{ mesh: THREE.Mesh, body: CANNON.Body, type: number }[]} */
    let fruits = [];
    let nextType = 0;
    let mergeCooldown = 0;

    let ghostMesh = null;
    let ghostVisualType = -1;
    const ghostPos = new THREE.Vector3(0, DROP_CENTER_Y, 0);

    function disposeGhost() {
      if (!ghostMesh) return;
      scene.remove(ghostMesh);
      ghostMesh.geometry.dispose();
      if (ghostMesh.material && typeof ghostMesh.material.dispose === 'function') {
        ghostMesh.material.dispose();
      }
      ghostMesh = null;
      ghostVisualType = -1;
    }

    function ensureGhostForType(type) {
      if (ghostVisualType === type && ghostMesh) return;
      disposeGhost();
      const spec = FRUITS[type];
      const geo = new THREE.SphereGeometry(spec.radius, 28, 20);
      const mat = new THREE.MeshStandardMaterial({
        color: spec.color,
        roughness: 0.32,
        metalness: 0.12,
        emissive: spec.color,
        emissiveIntensity: 0.22,
      });
      ghostMesh = new THREE.Mesh(geo, mat);
      ghostMesh.renderOrder = 2;
      scene.add(ghostMesh);
      ghostVisualType = type;
    }

    function pendingDropType() {
      return nextType % 2;
    }

    function updateGhostAt(clientX, clientY) {
      const t = pendingDropType();
      ensureGhostForType(t);
      const spec = FRUITS[t];
      const rect = renderer.domElement.getBoundingClientRect();
      const ndcX = ((clientX - rect.left) / rect.width) * 2 - 1;
      const ndcY = -((clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(new THREE.Vector2(ndcX, ndcY), camera);
      dropPlane.constant = -DROP_CENTER_Y;
      if (!raycaster.ray.intersectPlane(dropPlane, planeHit)) return;
      const c = clampDropXZ(planeHit.x, planeHit.z, spec.radius);
      ghostPos.set(c.x, DROP_CENTER_Y, c.z);
      ghostMesh.position.copy(ghostPos);
    }

    function spawnFruit(type, x, y, z) {
      const spec = FRUITS[type];
      const cx = clampDropXZ(x, z, spec.radius).x;
      const geo = new THREE.SphereGeometry(spec.radius, 32, 24);
      const mat = new THREE.MeshStandardMaterial({
        color: spec.color,
        roughness: 0.42,
        metalness: 0.06,
        emissive: spec.color,
        emissiveIntensity: 0.12,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);

      const shape = new CANNON.Sphere(spec.radius);
      const body = new CANNON.Body({
        mass: FRUIT_MASS_BASE + type * FRUIT_MASS_PER_TIER,
        linearDamping: 0.12,
        angularDamping: 0.45,
        material: physicsMaterial,
      });
      body.addShape(shape);
      body.position.set(cx, y, ROW_Z);
      body.sleepSpeedLimit = 0.28;
      body.sleepTimeLimit = 0.55;
      body.fruitType = type;
      world.addBody(body);

      fruits.push({ mesh, body, type });
    }

    function removeFruit(entry) {
      scene.remove(entry.mesh);
      entry.mesh.geometry.dispose();
      if (entry.mesh.material && typeof entry.mesh.material.dispose === 'function') {
        entry.mesh.material.dispose();
      }
      world.removeBody(entry.body);
      fruits = fruits.filter((f) => f !== entry);
    }

    function tryMerge() {
      if (mergeCooldown > 0 || gameOver) return;
      const dynamics = fruits.filter((f) => f.type <= MERGEABLE_TYPE_MAX);
      for (let i = 0; i < dynamics.length; i++) {
        for (let j = i + 1; j < dynamics.length; j++) {
          const a = dynamics[i];
          const b = dynamics[j];
          if (a.type !== b.type) continue;
          const ra = FRUITS[a.type].radius;
          const rb = FRUITS[b.type].radius;
          const touch = ra + rb;
          const dist = a.body.position.distanceTo(b.body.position);
          const mergeDist = touch * 1.1;
          if (dist > mergeDist) continue;

          const nx = (a.body.position.x + b.body.position.x) / 2;
          const ny = (a.body.position.y + b.body.position.y) / 2;
          const newType = a.type + 1;
          const rNew = FRUITS[newType].radius;
          const lim = innerHalfXForRadius(rNew);
          const cx = Math.max(-lim, Math.min(lim, nx));
          const nyLifted = Math.max(rNew * 0.45, ny);

          removeFruit(a);
          removeFruit(b);
          spawnFruit(newType, cx, nyLifted, ROW_Z);
          const merged = fruits[fruits.length - 1];
          merged.body.velocity.scale(0.35, merged.body.velocity);
          merged.body.angularVelocity.scale(0.4, merged.body.angularVelocity);

          const pts = MERGE_POINTS[a.type] ?? 20;
          addScore(pts);

          mergeCooldown = 10;
          return;
        }
      }
    }

    function checkGameOver(dt) {
      if (gameOver) return;
      let anyOver = false;
      for (const f of fruits) {
        const r = FRUITS[f.type].radius;
        if (f.body.position.y + r >= GAME_OVER_Y) {
          anyOver = true;
          break;
        }
      }
      if (anyOver) {
        gameOverDwell += dt;
        if (gameOverDwell >= GAME_OVER_DWELL_SEC) {
          gameOver = true;
          overlay.classList.add('visible');
        }
      } else {
        gameOverDwell = 0;
      }
    }

    function updateDropLock(dt) {
      if (dropAllowed || gameOver) return;
      if (!lastDroppedBody) {
        dropAllowed = true;
        dropLockCalmSec = 0;
        return;
      }
      const entry = fruits.find((f) => f.body === lastDroppedBody);
      if (!entry) {
        lastDroppedBody = null;
        dropAllowed = true;
        dropLockCalmSec = 0;
        return;
      }
      const r = FRUITS[entry.type].radius;
      const top = lastDroppedBody.position.y + r;
      const belowSpawnBand = top < DROP_CENTER_Y - 0.04;
      const calm = lastDroppedBody.velocity.lengthSquared() < 0.06;
      if (calm) dropLockCalmSec += dt;
      else dropLockCalmSec = 0;
      const settled =
        (belowSpawnBand && calm) ||
        (calm && dropLockCalmSec > 0.28) ||
        dropLockCalmSec > 1.2;
      if (settled) {
        dropAllowed = true;
        lastDroppedBody = null;
        dropLockCalmSec = 0;
      }
    }

    function fullReset() {
      fruits.slice().forEach(removeFruit);
      nextType = 0;
      mergeCooldown = 0;
      score = 0;
      level = 1;
      levelScoreGoal = 200;
      gameOver = false;
      gameOverDwell = 0;
      dropAllowed = true;
      lastDroppedBody = null;
      dropLockCalmSec = 0;
      overlay.classList.remove('visible');
      syncHud();
      applyCupLayout();
      ensureGhostForType(pendingDropType());
      ghostPos.y = DROP_CENTER_Y;
    }

    function dropNext() {
      if (gameOver || !dropAllowed) return;
      const t = pendingDropType();
      nextType++;
      const spec = FRUITS[t];
      const c = clampDropXZ(ghostPos.x, ghostPos.z, spec.radius);
      spawnFruit(t, c.x, DROP_CENTER_Y, ROW_Z);
      const last = fruits[fruits.length - 1];
      last.body.velocity.set(0, -0.28, 0);
      lastDroppedBody = last.body;
      dropAllowed = false;
      ensureGhostForType(pendingDropType());
    }

    renderer.domElement.addEventListener('pointermove', (e) => {
      if (e.target !== renderer.domElement) return;
      updateGhostAt(e.clientX, e.clientY);
    });

    renderer.domElement.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return;
      updateGhostAt(e.clientX, e.clientY);
      dropNext();
    });

    function toggleBrowserFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.();
      } else {
        document.exitFullscreen?.();
      }
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'r' || e.key === 'R') fullReset();
      if (e.key === 'f' || e.key === 'F') toggleBrowserFullscreen();
    });

    window.addEventListener('resize', () => {
      renderer.setSize(innerWidth, innerHeight);
      applyCupLayout();
      updateGhostAt(innerWidth / 2, innerHeight / 2);
    });

    const clock = new THREE.Clock();
    let acc = 0;
    const fixed = 1 / 120;

    function tick() {
      requestAnimationFrame(tick);
      const dt = Math.min(clock.getDelta(), 0.05);

      if (!gameOver) {
        acc += dt;
        while (acc >= fixed) {
          world.step(fixed);
          acc -= fixed;
        }
      }
      if (mergeCooldown > 0) mergeCooldown--;

      updateDropLock(dt);

      for (const f of fruits) {
        f.body.position.z = ROW_Z;
        f.body.velocity.z = 0;
        const r = FRUITS[f.type].radius;
        const lim = innerHalfXForRadius(r);
        const x = f.body.position.x;
        if (x > lim) {
          f.body.position.x = lim;
          f.body.velocity.x *= -0.15;
        } else if (x < -lim) {
          f.body.position.x = -lim;
          f.body.velocity.x *= -0.15;
        }
        f.mesh.position.copy(f.body.position);
        f.mesh.quaternion.copy(f.body.quaternion);
      }

      tryMerge();
      checkGameOver(dt);

      renderer.render(scene, camera);
    }

    syncHud();
    ensureGhostForType(pendingDropType());
    updateGhostAt(innerWidth / 2, innerHeight / 2);

    tick();
  </script>
</body>
</html>
