services:
  - type: web
    name: periodic-stack
    runtime: static
    rootDir: physics-stack-ui
    buildCommand: npm ci && npm run build:render
    staticPublishPath: render-deploy
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - physics-stack-ui/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
